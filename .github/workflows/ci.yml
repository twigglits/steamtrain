name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compile check
        run: python3 -m compileall -q slob tests
      - name: Test
        run: python3 -m unittest discover -s tests -v

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ShellCheck shell scripts
        run: shellcheck install.sh uninstall.sh scripts/next-version.sh
